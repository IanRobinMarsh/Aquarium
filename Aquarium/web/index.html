<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarium — Network Traffic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }

  /* Shared panel style — frosted glass */
  .panel {
    position: fixed;
    pointer-events: none;
    background: rgba(1,10,24,0.52);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(80,170,230,0.18);
    border-radius: 10px;
  }

  #hud {
    top: 14px; right: 16px;
    padding: 8px 14px;
    font: 12px/1.85 'Courier New', monospace;
    color: rgba(160,220,255,0.82);
    text-align: right;
    letter-spacing: 0.03em;
  }

  #status {
    bottom: 14px; left: 16px;
    padding: 6px 12px;
    font: 11px/1.5 'Courier New', monospace;
    color: rgba(140,205,255,0.7);
  }

  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
    filter: blur(0.5px) brightness(1.3);
  }

  #legend {
    bottom: 14px; right: 16px;
    padding: 10px 14px 8px;
    font: 11px/2.0 'Courier New', monospace;
    color: rgba(160,210,255,0.62);
    letter-spacing: 0.02em;
    column-count: 2;
    column-gap: 18px;
  }

  #legend div { break-inside: avoid; white-space: nowrap; }
  #legend .sep { column-span: all; border-top: 1px solid rgba(80,160,220,0.14); margin: 4px 0 2px; height: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="panel">
  <div id="fps">-- fps</div>
  <div id="fish-count">0 fish</div>
  <div id="pkt-count">0 packets</div>
</div>

<div id="status" class="panel">
  <span class="dot" id="ws-dot" style="background:#555"></span>
  <span id="ws-label">connecting…</span>
</div>

<div id="legend" class="panel">
  <div><span class="dot" style="background:#FF6B35"></span>HTTP</div>
  <div><span class="dot" style="background:#4A90D9"></span>SSH</div>
  <div><span class="dot" style="background:#9B59B6"></span>TLS/QUIC</div>
  <div><span class="dot" style="background:#A8E6CF"></span>DNS</div>
  <div><span class="dot" style="background:#E8F5A3"></span>UDP</div>
  <div><span class="dot" style="background:#CC3820"></span>FTP</div>
  <div><span class="dot" style="background:#F5C518"></span>SMTP</div>
  <div><span class="dot" style="background:#7CB84A"></span>NTP</div>
  <div><span class="dot" style="background:#445566"></span>Other</div>
  <div class="sep"></div>
  <div style="opacity:0.58"><span class="dot" style="background:#3A7A48"></span>Turtle</div>
  <div style="opacity:0.58"><span class="dot" style="background:#284E6C"></span>Manta ray</div>
  <div style="opacity:0.58"><span class="dot" style="background:#3C566C"></span>Shark</div>
  <div style="opacity:0.58"><span class="dot" style="background:#1C3048"></span>Whale shark</div>
  <div style="opacity:0.58"><span class="dot" style="background:#8A3A1A"></span>Crab</div>
  <div style="opacity:0.58"><span class="dot" style="background:#C87820"></span>Seahorse</div>
</div>

<script type="module" src="aquarium.js"></script>
</body>
</html>
